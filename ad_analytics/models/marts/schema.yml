version: 2

models:
  - name: mart_campaign_performance
    description: "Performance de campañas publicitarias con métricas de conversión y engagement"
    columns:
      - name: campaign_id
        description: "ID único de la campaña"
        tests:
          - not_null
          - unique
      - name: campaign_name
        tests:
          - not_null
      - name: total_budget
        tests:
          - not_null
      - name: campaign_status
        description: "Estado de la campaña. 'No Events' indica campañas con presupuesto asignado pero sin actividad registrada."
        tests:
          - not_null
          - accepted_values:
              values: ['Active', 'No Events']
      - name: impressions
        description: "Total de impresiones. 0 indica campaña sin eventos."
        tests:
          - not_null
      - name: clicks
        tests:
          - not_null
      - name: purchases
        tests:
          - not_null

  - name: mart_user_behavior
    description: "Comportamiento de compra segmentado por demografía y tiempo"
    columns:
      - name: country
        tests:
          - not_null
      - name: total_purchases
        tests:
          - not_null

  - name: mart_conversion_funnel
    description: "Tasas de conversión por etapa del funnel por campaña"
    columns:
      - name: campaign_id
        tests:
          - not_null
          - unique
      - name: impressions
        tests:
          - not_null
      - name: clicks
        tests:
          - not_null
      - name: purchases
        tests:
          - not_null